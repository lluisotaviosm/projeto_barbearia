{% extends "core/base.html" %}

{% block content %}
<div class="min-h-[calc(100vh-80px)] flex flex-col items-center justify-center p-4 relative overflow-hidden -mt-8">
    <!-- Fundo abstrato vermelho/dourado -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-red-900/10 rounded-full blur-3xl -z-10">
    </div>

    <div class="w-full max-w-md bg-dark-800 border border-gray-800 p-8 rounded-2xl shadow-2xl z-10 text-center">

        <div class="mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Encerrar Sessão</h1>
            <p class="text-gray-400">Tem certeza de que deseja sair, {{ user.username|title }}?</p>
        </div>

        <form method="post" action="{% url 'account_logout' %}" class="space-y-4">
            {% csrf_token %}
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}

            <button type="submit"
                class="w-full bg-red-600 hover:bg-red-500 text-white font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(220,38,38,0.3)] transition-all duration-300 transform hover:-translate-y-0.5 text-lg">
                Sim, quero sair
            </button>

            <a href="{% url 'index' %}"
                class="block w-full bg-dark-900 hover:bg-gray-800 border border-gray-700 text-gray-300 font-bold py-3.5 rounded-xl transition-all duration-300 transform hover:-translate-y-0.5 text-lg mt-4">
                Cancelar e Voltar
            </a>
        </form>
    </div>
</div>
{% endblock %}
