{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-16">
    <div class="text-center mb-12">
        <h2 class="text-4xl font-bold mb-4 text-[#d4af37]">O que vamos fazer hoje?</h2>
        <p class="text-gray-500">Barbeiro: {{ barbeiro.user.nome_completo }}</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for servico in servicos %}
            <a href="{% url 'selecionar_horario' barbeiro.id servico.id %}" class="group">
                <div class="dark-card p-6 rounded-3xl flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-bold group-hover:text-[#d4af37] transition-colors">{{ servico.nome }}</h3>
                        <p class="text-gray-500 text-sm">{{ servico.duracao_minutos }} min</p>
                    </div>
                    <div class="text-xl font-bold text-white">
                        R$ {{ servico.preco }}
                    </div>
                </div>
            </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
