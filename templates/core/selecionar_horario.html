{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-16">
    <div class="text-center mb-12">
        <h2 class="text-4xl font-bold mb-4 text-[#d4af37]">Escolha o Horário</h2>
        <p class="text-gray-500">{{ servico.nome }} com {{ barbeiro.user.nome_completo }}</p>
    </div>

    <form method="post" class="space-y-8">
        {% csrf_token %}
        <div class="flex flex-col items-center">
            <label class="text-gray-400 mb-4 font-semibold">Selecione a Data</label>
            <input type="date" name="data" required class="bg-black border border-white/10 rounded-2xl px-6 py-4 text-white focus:border-[#d4af37] outline-none">
        </div>

        <div class="grid grid-cols-3 md:grid-cols-5 gap-4">
            {% for horario in horarios %}
                <label class="cursor-pointer group">
                    <input type="radio" name="horario" value="{{ horario }}" class="hidden peer" required>
                    <div class="dark-card p-4 rounded-2xl text-center font-bold peer-checked:bg-[#d4af37] peer-checked:text-black transition-all">
                        {{ horario }}
                    </div>
                </label>
            {% endfor %}
        </div>

        <div class="flex justify-center mt-12">
            <button type="submit" class="btn-gold px-12 py-4 rounded-2xl text-lg shadow-xl shadow-[#d4af37]/10">
                Confirmar Agendamento
            </button>
        </div>
    </form>
</div>
{% endblock %}
