{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="dark-card p-8 rounded-3xl w-full max-w-lg">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Criar Conta</h2>
            <p class="text-gray-400 mt-2">Junte-se à Barbearia do Mineiro</p>
        </div>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type|default:'text' }}" 
                           name="{{ field.name }}" 
                           {% if field.field.required %}required{% endif %}
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37] text-white">
                    {% if field.errors %}
                        <p class="text-xs text-red-500 mt-1">{{ field.errors.0 }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full btn-gold py-4 rounded-xl shadow-lg shadow-[#d4af37]/10 mt-6">
                Cadastrar
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <p class="text-sm text-gray-500">
                Já tem uma conta? <a href="{% url 'login' %}" class="text-[#d4af37] hover:underline">Entrar</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
