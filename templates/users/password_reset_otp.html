{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="dark-card p-8 rounded-3xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Verificação (OTP)</h2>
            <p class="text-gray-400 mt-2">Enviamos um código de 6 dígitos no seu WhatsApp</p>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Código de 6 dígitos</label>
                <input type="text" name="otp" required minlength="6" maxlength="6" pattern="\d{6}" placeholder="000000"
                       class="w-full text-center tracking-[0.5em] text-2xl font-mono bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37] text-white">
            </div>
            
            <button type="submit" class="w-full btn-gold py-4 rounded-xl shadow-lg shadow-[#d4af37]/10 font-bold">
                Validar
            </button>
        </form>
    </div>
</div>
{% endblock %}
