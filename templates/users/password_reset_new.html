{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="dark-card p-8 rounded-3xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Nova Senha</h2>
            <p class="text-gray-400 mt-2">Crie uma nova senha de acesso</p>
        </div>
        
        <form method="post" id="resetForm" class="space-y-6">
            {% csrf_token %}
            <div class="relative">
                <label class="block text-sm font-medium text-gray-400 mb-2">Nova Senha (min. 6 caracteres)</label>
                <div class="relative">
                    <input type="password" id="id_nova_senha" name="nova_senha" required minlength="6"
                           class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 pr-12 focus:outline-none focus:border-[#d4af37] text-white">
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-white transition-colors">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="w-full btn-gold py-4 rounded-xl shadow-lg shadow-[#d4af37]/10 font-bold">
                Redefinir Senha
            </button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('id_nova_senha');
    const eyeIcon = document.getElementById('eyeIcon');
    
    if (togglePassword) {
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            if(type === 'text') {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });
    }

    const form = document.getElementById('resetForm');
    form.addEventListener('submit', function(e) {
        if (passwordInput.value.length < 6) {
            e.preventDefault();
            alert('A senha deve ter no mínimo 6 caracteres.');
        }
    });
});
</script>
{% endblock %}
