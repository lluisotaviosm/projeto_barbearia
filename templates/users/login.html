{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="dark-card p-8 rounded-3xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Bem-vindo</h2>
            <p class="text-gray-400 mt-2">Acesse sua conta para agendar</p>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-4 bg-red-900/30 border border-red-500/50 rounded-xl text-red-200 text-sm">
                    E-mail ou senha incorretos. Por favor, tente novamente.
                </div>
            {% endif %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Usuário ou E-mail</label>
                <input type="text" name="username" required class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37] text-white">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Senha</label>
                <input type="password" name="password" required class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37] text-white">
            </div>
            
            <button type="submit" class="w-full btn-gold py-4 rounded-xl shadow-lg shadow-[#d4af37]/10">
                Entrar
            </button>
        </form>
        
        <div class="mt-8 text-center space-y-4">
            <p class="text-sm text-gray-500">
                Não tem uma conta? <a href="{% url 'cadastro' %}" class="text-[#d4af37] hover:underline">Cadastre-se</a>
            </p>
            <p class="text-sm text-gray-500">
                <a href="{% url 'password_reset' %}" class="hover:text-gray-300">Esqueci minha senha</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
