{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
    <div class="dark-card p-8 rounded-3xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Recuperar Senha</h2>
            <p class="text-gray-400 mt-2">Enviaremos um link para o seu e-mail</p>
        </div>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-2">Seu e-mail</label>
                <input type="email" name="email" required class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:border-[#d4af37] text-white">
            </div>
            
            <button type="submit" class="w-full btn-gold py-4 rounded-xl">
                Enviar Link
            </button>
        </form>
    </div>
</div>
{% endblock %}
